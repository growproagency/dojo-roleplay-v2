    <path d="M307 198l-16 230h70l-16-230Z" fill="url(#cyanFill)" stroke="#6df6ff" stroke-width="6"/>
    <path d="M132 428h108v39H132zM272 428h108v39H272z" fill="url(#cyanFill)" stroke="#5feeff" stroke-width="6"/>
    <path d="M151 385h70M291 385h70" stroke="#57eaff" stroke-width="8"/>
    <path d="M248 184h16v38h-16z" fill="url(#cyanFill)" stroke="#42e7ff" stroke-width="5"/>
  </g>

