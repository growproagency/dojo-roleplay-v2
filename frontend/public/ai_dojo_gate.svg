<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">AI Dojo gate logo</title>
  <desc id="desc">A neon blue dojo gate with an AI microchip centered below it.</desc>
  <defs>
    <linearGradient id="cyanFill" x1="120" y1="80" x2="390" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#63f5ff"/>
      <stop offset="0.45" stop-color="#10c8f5"/>
      <stop offset="1" stop-color="#1168ff"/>
    </linearGradient>
    <linearGradient id="edgeFill" x1="128" y1="80" x2="384" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a7fbff"/>
      <stop offset="0.45" stop-color="#1fd8ff"/>
      <stop offset="1" stop-color="#0b66ff"/>
    </linearGradient>
    <filter id="neon" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.00 0 0 0 0 0.75 0 0 0 0 1.00 0 0 0 0.85 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.00 0 0 0 0 0.70 0 0 0 0 1.00 0 0 0 0.55 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)">
    <path d="M83 91c95 32 251 32 346 0l-18 46c-91 21-219 21-310 0L83 91Z" fill="url(#cyanFill)" stroke="#7ef7ff" stroke-width="6"/>
    <path d="M105 149h302l-12 33H117l-12-33Z" fill="url(#cyanFill)" stroke="#18d8ff" stroke-width="5"/>
    <path d="M112 224h288" stroke="url(#edgeFill)" stroke-width="22"/>
    <path d="M88 224h48M376 224h48" stroke="url(#edgeFill)" stroke-width="24"/>
    <path d="M155 188h41M316 188h41" stroke="#6df6ff" stroke-width="9"/>
